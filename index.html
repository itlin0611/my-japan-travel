        const App = () => {
            const [records, setRecords] = useState({});
            const [searchQuery, setSearchQuery] = useState('');
            const [expandedCategories, setExpandedCategories] = useState({});
            const [editingItem, setEditingItem] = useState(null);
            const [showMap, setShowMap] = useState(false);
            const [syncConfig, setSyncConfig] = useState({ token: '', repo: '', path: 'data.json' });
            const [isSyncing, setIsSyncing] = useState(false);
            const [showSyncPanel, setShowSyncPanel] = useState(false);
            const mapInstance = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                const saved = localStorage.getItem('japan_travel_records');
                const config = localStorage.getItem('japan_travel_sync_config');
                if (saved) setRecords(JSON.parse(saved));
                if (config) setSyncConfig(JSON.parse(config));
            }, []);

            // 初始化與更新地圖
            useEffect(() => {
                if (showMap && !mapInstance.current) {
                    mapInstance.current = L.map('map').setView([36.2048, 138.2529], 5);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors'
                    }).addTo(mapInstance.current);
                }
                if (showMap) {
                    updateMarkers();
                }
            }, [showMap, records]);

            const updateMarkers = () => {
                if (!mapInstance.current) return;
                markersRef.current.forEach(m => m.remove());
                markersRef.current = [];

                Object.keys(COORDINATES).forEach(name => {
                    const isVisited = records[name];
                    const color = isVisited ? '#10b981' : '#ef4444'; 
                    const marker = L.circleMarker(COORDINATES[name], {
                        radius: 7,
                        fillColor: color,
                        color: "#fff",
                        weight: 1.5,
                        opacity: 1,
                        fillOpacity: 0.9
                    }).addTo(mapInstance.current);
                    
                    marker.bindPopup(`<b>${name}</b><br>${isVisited ? '✅ 已造訪' : '❌ 未造訪'}`);
                    markersRef.current.push(marker);
                });
            };

            const saveRecords = async (newRecords) => {
                setRecords(newRecords);
                localStorage.setItem('japan_travel_records', JSON.stringify(newRecords));
                if (syncConfig.token && syncConfig.repo) {
                    await syncToGitHub(newRecords);
                }
            };

            const syncToGitHub = async (data) => {
                if (!syncConfig.token || !syncConfig.repo) return;
                setIsSyncing(true);
                try {
                    const url = `https://api.github.com/repos/${syncConfig.repo}/contents/${syncConfig.path}`;
                    const res = await fetch(url, { headers: { Authorization: `token ${syncConfig.token}` } });
                    let sha = '';
                    if (res.ok) {
                        const fileData = await res.json();
                        sha = fileData.sha;
                    }
                    const body = {
                        message: `Sync records ${new Date().toLocaleString()}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                        sha: sha || undefined
                    };
                    await fetch(url, {
                        method: 'PUT',
                        headers: { Authorization: `token ${syncConfig.token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                } catch (err) { console.error("Sync Failed", err); } finally { setIsSyncing(false); }
            };

            const fetchFromGitHub = async () => {
                if (!syncConfig.token || !syncConfig.repo) return;
                setIsSyncing(true);
                try {
                    const url = `https://api.github.com/repos/${syncConfig.repo}/contents/${syncConfig.path}`;
                    const res = await fetch(url, { headers: { Authorization: `token ${syncConfig.token}` } });
                    if (res.ok) {
                        const fileData = await res.json();
                        const content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
                        setRecords(content);
                        localStorage.setItem('japan_travel_records', JSON.stringify(content));
                    }
                } catch (err) { alert("讀取失敗"); } finally { setIsSyncing(false); }
            };

            const handleToggleVisit = (item) => {
                const newRecords = { ...records };
                if (newRecords[item]) {
                    if (confirm(`確定要刪除「${item}」的紀錄嗎？`)) delete newRecords[item];
                    else return;
                } else {
                    newRecords[item] = { visited: true, date: new Date().toISOString().split('T')[0], imageUrl: '', albumUrl: '' };
                }
                saveRecords(newRecords);
            };

            const stats = useMemo(() => {
                const allItems = INITIAL_DATA.flatMap(cat => cat.items);
                const uniqueTotalCount = new Set(allItems).size;
                const visitedCount = Object.keys(records).length;
                return { total: uniqueTotalCount, visitedCount };
            }, [records]);

            const filteredData = useMemo(() => {
                if (!searchQuery) return INITIAL_DATA;
                return INITIAL_DATA.map(cat => ({
                    ...cat,
                    items: cat.items.filter(item => item.includes(searchQuery))
                })).filter(cat => cat.items.length > 0);
            }, [searchQuery]);

            // --- 圖標組件 ---
            const Icon = ({ name, className = "w-5 h-5", size = 20 }) => {
                const icons = {
                    MapPin: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
                    Trophy: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
                    Search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
                    ChevronDown: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>,
                    ChevronUp: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m18 15-6-6-6 6"/></svg>,
                    CheckCircle2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
                    Map: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>,
                    Cloud: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.437A7.002 7.002 0 0 0 5 8c0 .323.023.64.066.95C2.175 9.94 0 12.716 0 16c0 3.314 2.686 6 6 6h11.5"/></svg>,
                    RefreshCw: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>,
                    Calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>,
                    Image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                };
                return icons[name] || null;
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="text-center md:text-left">
                                    <h1 className="text-3xl font-black text-red-600 flex items-center justify-center md:justify-start gap-2">
                                        <Icon name="MapPin" className="text-red-600" size={32} /> 旅日足跡
                                    </h1>
                                    <div className="flex gap-4 mt-2 justify-center md:justify-start">
                                        <button onClick={() => setShowSyncPanel(!showSyncPanel)} className="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-red-500 transition-colors">
                                            <Icon name="Cloud" size={14} /> {syncConfig.repo ? `同步中` : '連結 GitHub'}
                                        </button>
                                        <button onClick={() => setShowMap(!showMap)} className={`flex items-center gap-2 text-xs font-bold ${showMap ? 'text-red-600' : 'text-slate-400'} hover:text-red-500 transition-colors`}>
                                            <Icon name="Map" size={14} /> {showMap ? '關閉地圖' : '開啟地圖'}
                                        </button>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 bg-slate-100 px-5 py-3 rounded-2xl">
                                    <Icon name="Trophy" className="text-amber-500" size={28} />
                                    <div className="text-xl font-black text-slate-800">{stats.visitedCount} <span className="text-sm font-normal text-slate-400">/ {stats.total}</span></div>
                                </div>
                            </div>

                            {showSyncPanel && (
                                <div className="mt-4 p-4 bg-slate-50 rounded-2xl border border-slate-200 space-y-3 animate-in fade-in duration-300">
                                    <input type="password" placeholder="GitHub Token" className="w-full p-2 text-xs rounded-lg border outline-none" value={syncConfig.token} onChange={(e) => setSyncConfig({...syncConfig, token: e.target.value})} />
                                    <input type="text" placeholder="Repo (帳號/名稱)" className="w-full p-2 text-xs rounded-lg border outline-none" value={syncConfig.repo} onChange={(e) => setSyncConfig({...syncConfig, repo: e.target.value})} />
                                    <button onClick={() => { localStorage.setItem('japan_travel_sync_config', JSON.stringify(syncConfig)); fetchFromGitHub(); }} className="px-4 py-2 bg-red-600 text-white text-xs font-bold rounded-lg w-full">儲存並同步</button>
                                </div>
                            )}

                            {showMap && (
                                <div className="mt-6 animate-in zoom-in-95 duration-300 relative">
                                    <div id="map" className="shadow-inner border border-slate-200"></div>
                                    <div className="absolute bottom-4 left-4 z-[1000] bg-white/90 backdrop-blur p-2 rounded-lg text-[10px] font-bold shadow-sm border border-slate-200">
                                        <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-emerald-500"></span> 已造訪</div>
                                        <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-red-500"></span> 未造訪</div>
                                    </div>
                                </div>
                            )}

                            <div className="mt-6 relative">
                                <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={20} />
                                <input type="text" placeholder="搜尋景點名稱..." className="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-red-500 transition-all font-medium" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                        </header>

                        <div className="space-y-4 pb-20">
                            {filteredData.map(category => {
                                const catVisitedCount = category.items.filter(i => records[i]).length;
                                const catTotalCount = category.items.length;
                                const catPercentage = Math.round((catVisitedCount / catTotalCount) * 100);

                                return (
                                    <div key={category.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                        <button onClick={() => setExpandedCategories(prev => ({...prev, [category.id]: !prev[category.id]}))} className="w-full px-6 py-5 flex justify-between items-center hover:bg-slate-50 transition-colors">
                                            <div className="flex items-center gap-3">
                                                <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                                    <span className="text-xl">{category.icon}</span>{category.category}
                                                </h2>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] font-black bg-red-50 text-red-600 px-2 py-0.5 rounded-md border border-red-100">{catVisitedCount} / {catTotalCount}</span>
                                                    <span className={`text-[10px] font-black px-2 py-0.5 rounded-md border ${catPercentage === 100 ? 'bg-green-50 text-green-600 border-green-100' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>{catPercentage}%</span>
                                                </div>
                                            </div>
                                            <Icon name={expandedCategories[category.id] ? "ChevronUp" : "ChevronDown"} className="text-slate-400" size={20} />
                                        </button>

                                        {(expandedCategories[category.id] || searchQuery) && (
                                            <div className="px-6 pb-6 pt-2 grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-50">
                                                {category.items.map(item => {
                                                    const record = records[item];
                                                    return (
                                                        <div key={item} className={`p-4 rounded-2xl border transition-all ${record ? 'border-red-100 bg-red-50/20 shadow-sm' : 'border-slate-100 bg-white'}`}>
                                                            <div className="flex justify-between items-center">
                                                                <div className="flex items-center gap-3">
                                                                    <button onClick={() => handleToggleVisit(item)} className={`transition-transform active:scale-90 ${record ? 'text-red-500' : 'text-slate-200 hover:text-slate-300'}`}><Icon name="CheckCircle2" className={record ? 'fill-red-50' : ''} size={28} /></button>
                                                                    <span className={`font-bold transition-colors ${record ? 'text-red-900' : 'text-slate-500'}`}>{item}</span>
                                                                </div>
                                                                {record && <button onClick={() => setEditingItem(editingItem === item ? null : item)} className="text-xs text-slate-400 underline font-medium">{editingItem === item ? '收起' : '編輯'}</button>}
                                                            </div>
                                                            {record && !editingItem && record.imageUrl && <div className="mt-3 mb-2 rounded-xl overflow-hidden border aspect-video bg-slate-100 max-w-[240px] shadow-sm"><img src={record.imageUrl} alt={item} className="w-full h-full object-cover" /></div>}
                                                            {record && !editingItem && <div className="flex flex-wrap gap-x-4 gap-y-1 mt-2 pl-10">
                                                                {record.date && <div className="text-[11px] font-bold text-slate-400 flex items-center gap-1"><Icon name="Calendar" size={14} /> {record.date}</div>}
                                                                {record.albumUrl && <a href={record.albumUrl} target="_blank" className="text-[11px] font-bold text-red-500 flex items-center gap-1 underline decoration-red-200 underline-offset-2"><Icon name="Image" size={14} /> 相簿</a>}
                                                            </div>}
                                                            {record && editingItem === item && <div className="mt-4 space-y-3 p-3 bg-white rounded-xl border border-red-100 shadow-inner">
                                                                <div><label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">日期</label><input type="date" className="w-full bg-slate-50 p-2 rounded text-sm outline-none font-bold text-slate-700" value={record.date} onChange={(e) => { const r = {...records}; r[item].date = e.target.value; saveRecords(r); }} /></div>
                                                                <div><label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase text-xs">Snapshot 網址</label><input type="text" placeholder="https://..." className="w-full bg-slate-50 p-2 rounded text-xs outline-none font-medium" value={record.imageUrl} onChange={(e) => { const r = {...records}; r[item].imageUrl = e.target.value; saveRecords(r); }} /></div>
                                                                <div><label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase text-xs">相簿連結</label><input type="text" placeholder="https://photos.google.com/..." className="w-full bg-slate-50 p-2 rounded text-xs outline-none font-medium" value={record.albumUrl} onChange={(e) => { const r = {...records}; r[item].albumUrl = e.target.value; saveRecords(r); }} /></div>
                                                            </div>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
