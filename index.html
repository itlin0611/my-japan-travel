<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅日足跡紀錄器 - GitHub 同步版</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 圖標組件 ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                MapPin: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
                Trophy: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
                Search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
                ChevronDown: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>,
                ChevronUp: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m18 15-6-6-6 6"/></svg>,
                CheckCircle2: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
                Camera: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
                Calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>,
                Image: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
                Cloud: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.437A7.002 7.002 0 0 0 5 8c0 .323.023.64.066.95C2.175 9.94 0 12.716 0 16c0 3.314 2.686 6 6 6h11.5"/></svg>,
                RefreshCw: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            };
            return icons[name] || null;
        };

        // --- 分類景點資料 ---
        const INITIAL_DATA = [
            { id: '3v', category: '日本三景', items: ['松島', '天橋立', '宮島'] },
            { id: '3g', category: '日本三名園', items: ['兼六園', '後樂園', '偕樂園'] },
            { id: '3s', category: '日本三名泉', items: ['有馬溫泉', '草津溫泉', '下呂溫泉'] },
            { id: '3n', category: '日本三大夜景', items: ['函館山夜景', '摩耶山掬星台夜景', '稻佐山夜景'] },
            { id: '12t', category: '現存十二天守', items: ['弘前城', '松本城', '丸岡城', '犬山城', '彥根城', '姬路城', '松江城', '備中松山城', '丸龜城', '松山城', '宇和島城', '高知城'] },
            { id: 'wh', category: '日本世界遺產', items: ['古都京都的文化財', '姬路城(WH)', '白川鄉合掌造村落', '嚴島神社', '古都奈良的文化財', '日光的神社與寺院', '富士山', '法隆寺地區', '屋久島', '白神山地', '廣島和平紀念館', '紀伊山地的靈場', '知床半島', '石見銀山', '平泉', '小笠原群島', '富岡製絲廠', '明治日本產業革命遺產', '國立西洋美術館', '沖之島', '長崎隱忍基督徒遺址', '百舌鳥・古市古墳群', '繩紋遺跡群', '佐渡島的金山']},
            { id: 'c100_1', category: '日本百大名城 (北/東日本)', items: ['根室半島砦跡群', '五稜郭', '松前城', '根城', '盛岡城', '多賀城', '仙台城', '久保田城', '山形城', '二本松城', '會津若松城', '白河小峰城', '水戶城', '足利氏館', '箕輪城', '金山城', '鉢形城', '川越城', '佐倉城', '江戶城', '八王子城', '小田原城', '武田氏館', '甲府城', '松代城', '上田城', '小諸城', '春日山城', '新發田城', '高岡城', '七尾城', '一乘谷城', '大野城']},
            { id: 'c100_2', category: '日本百大名城 (中/近畿)', items: ['金澤城', '福井城', '岩村城', '岐阜城', '名古屋城', '岡崎城', '長篠城', '伊賀上野城', '松阪城', '桑名城', '小谷城', '安土城', '觀音寺城', '二条城', '大阪城', '千早城', '竹田城', '篠山城', '明石城', '高取城', '和歌山城', '赤穗城', '洲本城']},
            { id: 'c100_3', category: '日本百大名城 (西日本/九州)', items: ['岡山城', '津山城', '福山城', '吉田郡山城', '廣島城', '岩國城', '萩城', '津和野城', '德島城', '高松城', '今治城', '湯築城', '大洲城', '福岡城', '名護屋城', '吉野里遺跡', '佐賀城', '平戶城', '島原城', '熊本城', '人吉城', '大分府內城', '岡城', '飫肥城', '鹿兒島城', '首里城']},
            { id: 'land_east', category: '人氣地標 (東日本)', items: ['東京鐵塔', '晴空塔', '淺草寺', '明治神宮', '澀谷十字路口', '台場鋼彈', '鎌倉大佛', '江之島', '蘆之湖', '箱根神社', '忍野八海', '新倉山淺間公園', '國營常陸海濱公園', '日光東照宮', '華嚴瀑布', '草津溫泉湯畑', '黑部立山', '地獄谷野猿公苑', '上高地', '飛驒高山古街', '白川鄉合掌村']},
            { id: 'land_west', category: '人氣地標 (西日本)', items: ['伊勢神宮', '琵琶湖白鬚鳥居', '伏見稻荷大社', '清水寺', '金閣寺', '嵐山竹林', '三十三間堂', '奈良公園', '東大寺', '春日大社', '萬博紀念公園', '道頓堀', '神戶港塔', '有馬溫泉街', '出雲大社', '鳥取砂丘', '足立美術館', '金刀比羅宮', '鳴門渦潮', '太宰府天滿宮', '由布院金鱗湖', '別府海地獄', '阿蘇火山', '高千穗峽', '櫻島火山', '美之海水族館', '萬座毛']}
        ];

        const App = () => {
            const [records, setRecords] = useState({});
            const [searchQuery, setSearchQuery] = useState('');
            const [expandedCategories, setExpandedCategories] = useState({});
            const [editingItem, setEditingItem] = useState(null);
            const [syncConfig, setSyncConfig] = useState({ token: '', repo: '', path: 'data.json' });
            const [isSyncing, setIsSyncing] = useState(false);
            const [showSyncPanel, setShowSyncPanel] = useState(false);

            // 初始化：從 LocalStorage 載入
            useEffect(() => {
                const saved = localStorage.getItem('japan_travel_records');
                const config = localStorage.getItem('japan_travel_sync_config');
                if (saved) setRecords(JSON.parse(saved));
                if (config) setSyncConfig(JSON.parse(config));
            }, []);

            // 儲存邏輯 (本地 + 嘗試同步 GitHub)
            const saveRecords = async (newRecords) => {
                setRecords(newRecords);
                localStorage.setItem('japan_travel_records', JSON.stringify(newRecords));
                
                if (syncConfig.token && syncConfig.repo) {
                    await syncToGitHub(newRecords);
                }
            };

            // GitHub API 同步核心邏輯
            const syncToGitHub = async (data) => {
                if (!syncConfig.token || !syncConfig.repo) return;
                setIsSyncing(true);
                try {
                    const url = `https://api.github.com/repos/${syncConfig.repo}/contents/${syncConfig.path}`;
                    // 先取得檔案 SHA (才能更新)
                    const res = await fetch(url, { headers: { Authorization: `token ${syncConfig.token}` } });
                    let sha = '';
                    if (res.ok) {
                        const fileData = await res.json();
                        sha = fileData.sha;
                    }

                    const body = {
                        message: `Update travel records ${new Date().toISOString()}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                        sha: sha || undefined
                    };

                    await fetch(url, {
                        method: 'PUT',
                        headers: { 
                            Authorization: `token ${syncConfig.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });
                } catch (err) {
                    console.error("Sync Failed", err);
                } finally {
                    setIsSyncing(false);
                }
            };

            // 從 GitHub 讀取
            const fetchFromGitHub = async () => {
                if (!syncConfig.token || !syncConfig.repo) return;
                setIsSyncing(true);
                try {
                    const url = `https://api.github.com/repos/${syncConfig.repo}/contents/${syncConfig.path}`;
                    const res = await fetch(url, { headers: { Authorization: `token ${syncConfig.token}` } });
                    if (res.ok) {
                        const fileData = await res.json();
                        const content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
                        setRecords(content);
                        localStorage.setItem('japan_travel_records', JSON.stringify(content));
                    }
                } catch (err) {
                    alert("讀取失敗，請檢查 Token 與 Repo 名稱");
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleToggleVisit = (item) => {
                const newRecords = { ...records };
                if (newRecords[item]) {
                    if (confirm(`確定要刪除「${item}」的紀錄嗎？`)) delete newRecords[item];
                    else return;
                } else {
                    newRecords[item] = { visited: true, date: new Date().toISOString().split('T')[0], imageUrl: '', albumUrl: '' };
                }
                saveRecords(newRecords);
            };

            const handleUpdateRecord = (item, field, value) => {
                const newRecords = { ...records };
                newRecords[item] = { ...newRecords[item], [field]: value };
                saveRecords(newRecords);
            };

            const stats = useMemo(() => {
                const total = INITIAL_DATA.reduce((acc, cat) => acc + cat.items.length, 0);
                const visitedCount = Object.keys(records).length;
                return { total, visitedCount, percent: Math.round((visitedCount / total) * 100) };
            }, [records]);

            const filteredData = useMemo(() => {
                if (!searchQuery) return INITIAL_DATA;
                return INITIAL_DATA.map(cat => ({
                    ...cat,
                    items: cat.items.filter(item => item.includes(searchQuery))
                })).filter(cat => cat.items.length > 0);
            }, [searchQuery]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        {/* Header */}
                        <header className="mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div>
                                    <h1 className="text-3xl font-black text-red-600 flex items-center gap-2">
                                        <Icon name="MapPin" className="w-8 h-8" /> 旅日足跡
                                    </h1>
                                    <button 
                                        onClick={() => setShowSyncPanel(!showSyncPanel)}
                                        className="mt-2 flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-red-500 transition-colors"
                                    >
                                        <Icon name="Cloud" className="w-3 h-3" />
                                        {syncConfig.repo ? `同步中: ${syncConfig.repo}` : '尚未連結 GitHub 同步'}
                                        {isSyncing && <Icon name="RefreshCw" className="w-3 h-3 animate-spin" />}
                                    </button>
                                </div>
                                <div className="flex items-center gap-4 bg-slate-100 px-5 py-3 rounded-2xl">
                                    <Icon name="Trophy" className="text-amber-500 w-7 h-7" />
                                    <div className="text-xl font-black text-slate-800">{stats.visitedCount} <span className="text-sm font-normal text-slate-400">/ {stats.total}</span></div>
                                </div>
                            </div>

                            {/* 同步設定面板 */}
                            {showSyncPanel && (
                                <div className="mt-4 p-4 bg-slate-50 rounded-2xl border border-slate-200 space-y-3">
                                    <h3 className="text-sm font-bold text-slate-600">GitHub 同步設定</h3>
                                    <input 
                                        type="password" placeholder="GitHub Token (PAT)" 
                                        className="w-full p-2 text-xs rounded-lg border"
                                        value={syncConfig.token}
                                        onChange={(e) => setSyncConfig({...syncConfig, token: e.target.value})}
                                    />
                                    <input 
                                        type="text" placeholder="Repo 名稱 (帳號/名稱, 如: user/my-travel)" 
                                        className="w-full p-2 text-xs rounded-lg border"
                                        value={syncConfig.repo}
                                        onChange={(e) => setSyncConfig({...syncConfig, repo: e.target.value})}
                                    />
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => {
                                                localStorage.setItem('japan_travel_sync_config', JSON.stringify(syncConfig));
                                                fetchFromGitHub();
                                            }}
                                            className="px-4 py-2 bg-red-600 text-white text-xs font-bold rounded-lg"
                                        >儲存並從 GitHub 讀取資料</button>
                                    </div>
                                </div>
                            )}

                            <div className="mt-6 relative">
                                <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text" placeholder="搜尋景點名稱..."
                                    className="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-red-500 transition-all"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </header>

                        {/* Content */}
                        <div className="space-y-4">
                            {filteredData.map(category => (
                                <div key={category.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                    <button 
                                        onClick={() => setExpandedCategories(prev => ({...prev, [category.id]: !prev[category.id]}))}
                                        className="w-full px-6 py-5 flex justify-between items-center hover:bg-slate-50 transition-colors"
                                    >
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-lg font-bold text-slate-700">{category.category}</h2>
                                            <span className="text-xs font-bold bg-red-50 text-red-600 px-3 py-1 rounded-full">
                                                {category.items.filter(i => records[i]).length} / {category.items.length}
                                            </span>
                                        </div>
                                        <Icon name={expandedCategories[category.id] ? "ChevronUp" : "ChevronDown"} className="text-slate-400" />
                                    </button>

                                    {(expandedCategories[category.id] || searchQuery) && (
                                        <div className="px-6 pb-6 pt-2 grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-50">
                                            {category.items.map(item => {
                                                const record = records[item];
                                                return (
                                                    <div key={item} className={`p-4 rounded-2xl border transition-all ${record ? 'border-red-100 bg-red-50/20' : 'border-slate-100 bg-white'}`}>
                                                        <div className="flex justify-between items-center mb-2">
                                                            <div className="flex items-center gap-3">
                                                                <button 
                                                                    onClick={() => handleToggleVisit(item)} 
                                                                    className={`transition-transform active:scale-90 ${record ? 'text-red-500' : 'text-slate-200'}`}
                                                                >
                                                                    <Icon name="CheckCircle2" className={`w-7 h-7 ${record ? 'fill-red-50' : ''}`} />
                                                                </button>
                                                                <span className={`font-bold ${record ? 'text-red-900' : 'text-slate-500'}`}>{item}</span>
                                                            </div>
                                                            {record && (
                                                                <button 
                                                                    onClick={() => setEditingItem(editingItem === item ? null : item)} 
                                                                    className="text-xs text-slate-400 underline"
                                                                >
                                                                    {editingItem === item ? '收起' : '編輯'}
                                                                </button>
                                                            )}
                                                        </div>

                                                        {/* 直接顯示 Snapshot */}
                                                        {record && !editingItem && record.imageUrl && (
                                                            <div className="mt-2 mb-3 rounded-xl overflow-hidden border aspect-video bg-slate-100">
                                                                <img src={record.imageUrl} alt={item} className="w-full h-full object-cover" />
                                                            </div>
                                                        )}

                                                        {record && !editingItem && (
                                                            <div className="flex flex-wrap gap-3 mt-1 pl-10">
                                                                <div className="text-[11px] font-bold text-slate-400 flex items-center gap-1"><Icon name="Calendar" className="w-3.5 h-3.5" /> {record.date}</div>
                                                                {record.albumUrl && (
                                                                    <a href={record.albumUrl} target="_blank" rel="noreferrer" className="text-[11px] font-bold text-red-500 flex items-center gap-1 underline"><Icon name="Image" className="w-3.5 h-3.5" /> 相簿</a>
                                                                )}
                                                            </div>
                                                        )}

                                                        {record && editingItem === item && (
                                                            <div className="mt-4 space-y-3 p-3 bg-white rounded-xl border border-red-100 shadow-inner">
                                                                <div className="space-y-1">
                                                                    <label className="text-[10px] font-bold text-slate-400">日期</label>
                                                                    <input type="date" className="w-full bg-slate-50 p-2 rounded text-sm" value={record.date} onChange={(e) => handleUpdateRecord(item, 'date', e.target.value)} />
                                                                </div>
                                                                <div className="space-y-1">
                                                                    <label className="text-[10px] font-bold text-slate-400">Snapshot 網址 (圖床)</label>
                                                                    <input type="text" placeholder="https://..." className="w-full bg-slate-50 p-2 rounded text-xs" value={record.imageUrl} onChange={(e) => handleUpdateRecord(item, 'imageUrl', e.target.value)} />
                                                                </div>
                                                                <div className="space-y-1">
                                                                    <label className="text-[10px] font-bold text-slate-400">Google Photos 相簿</label>
                                                                    <input type="text" placeholder="https://photos.google.com/..." className="w-full bg-slate-50 p-2 rounded text-xs" value={record.albumUrl} onChange={(e) => handleUpdateRecord(item, 'albumUrl', e.target.value)} />
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
